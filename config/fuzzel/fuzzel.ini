[main]
font=Inter:size=9.5
width=28
lines=8
anchor=center
prompt="> "
terminal=kitty
icon-theme=Papirus-Dark
icons-enabled=yes
match-mode=fuzzy
horizontal-pad=10
vertical-pad=6
inner-pad=6
line-height=15
dpi-aware=auto
layer=overlay
exit-on-keyboard-focus-loss=yes

[colors]
background=0d0d0dff
text=999999ff
match=ccccccff
selection=1a1a1aff
selection-text=e0e0e0ff
selection-match=ffffffc0
border=0d0d0dff

[border]
width=0
radius=10

[key-bindings]
delete-line-forward=none
prev=Up Control+p Control+k
next=Down Control+n Control+j
cancel=Escape
